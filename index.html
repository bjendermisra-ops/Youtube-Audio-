<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Registration Portal</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              DEFAULT: '#FF9432', // Vibrant orange accent
              dark: '#E07A1B',
              light: '#FFF5EB',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen pb-12">

  <!-- Auto-Login Session Check -->
  <script>
    if (localStorage.getItem("is_user_registered") === "true") {
      window.location.href = "go:home";
    }
  </script>

  <!-- Navigation / Branding Header -->
  <header class="w-full max-w-md mx-auto pt-8 px-6 text-center">
    <!-- Generic Spiritual/Community Emblem -->
    <div class="flex justify-center mb-4">
      <svg class="w-16 h-16 text-brand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 22h20L12 2z"/>
        <circle cx="12" cy="13" r="5"/>
      </svg>
    </div>
    <div class="border-b border-gray-100 pb-3 flex justify-center gap-8 text-sm font-medium">
      <span class="text-gray-400 cursor-pointer">Sign in</span>
      <span class="text-brand border-b-2 border-brand pb-3 px-1 font-semibold">Sign up</span>
    </div>
  </header>

  <!-- Main Form Container -->
  <main class="w-full max-w-md mx-auto px-6 mt-6">
    <form id="signupForm" onsubmit="handleFormSubmit(event)" class="space-y-5">
      
      <!-- Profile Picture Upload Area -->
      <div class="flex flex-col items-center justify-center mb-6">
        <div class="relative group">
          <div class="w-28 h-28 rounded-full border border-gray-200 bg-gray-100 overflow-hidden flex items-center justify-center relative">
            <img id="profilePreview" src="https://via.placeholder.com/150?text=Profile" class="w-full h-full object-cover hidden">
            <!-- Default Avatar SVG -->
            <svg id="defaultAvatar" class="w-16 h-16 text-gray-400" fill="currentColor" viewBox="0 0 24 24">
              <path d="M24 20.993V24H0v-2.996A14.977 14.977 0 0112.004 15c4.904 0 9.26 2.354 11.996 5.993zM16.002 8.999a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
            <!-- Uploading Spinner overlay -->
            <div id="uploadLoader" class="absolute inset-0 bg-black/40 flex items-center justify-center hidden">
              <div class="w-6 h-6 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
            </div>
          </div>
          <!-- Clickable Upload Badge -->
          <label for="imageUpload" class="absolute bottom-1 right-1 bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-full cursor-pointer shadow-md transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
          </label>
          <input type="file" id="imageUpload" accept="image/*" class="hidden" onchange="uploadProfileImage(event)">
        </div>
        <!-- Hidden URL store field -->
        <input type="hidden" id="imageUrlInput">
      </div>

      <!-- Full Name -->
      <div class="space-y-1">
        <label class="block text-xs font-semibold text-gray-700">Full Name <span class="text-red-500">*</span></label>
        <input type="text" id="fullName" required placeholder="Enter your Full Name" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-brand">
      </div>

      <!-- Mobile Number (+91 Pre-filled UI) -->
      <div class="space-y-1">
        <label class="block text-xs font-semibold text-gray-700">Mobile Number <span class="text-red-500">*</span></label>
        <div class="relative flex border border-gray-200 rounded-lg bg-white overflow-hidden focus-within:border-brand">
          <div class="px-3.5 flex items-center justify-center bg-gray-50 border-r border-gray-200 text-sm font-medium">
            <span class="mr-1.5">🇮🇳</span> +91
          </div>
          <input type="tel" id="mobileNumber" pattern="[0-9]{10}" required placeholder="Enter your Phone Number" class="w-full px-4 py-2.5 text-sm focus:outline-none">
        </div>
      </div>

      <!-- Email Address (Optional) -->
      <div class="space-y-1">
        <label class="block text-xs font-semibold text-gray-700">Email Address</label>
        <input type="email" id="emailAddress" placeholder="Enter your Email Address" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-brand">
      </div>

      <!-- Date of Birth -->
      <div class="space-y-1">
        <label class="block text-xs font-semibold text-gray-700">Date of Birth <span class="text-red-500">*</span></label>
        <input type="date" id="dob" required onchange="validateAge()" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-brand">
        <!-- Error Container -->
        <p id="dobError" class="text-xs text-red-500 font-medium pt-1 hidden">You must be at least 18 years old</p>
      </div>

      <!-- Address -->
      <div class="space-y-1">
        <label class="block text-xs font-semibold text-gray-700">Address <span class="text-red-500">*</span></label>
        <input type="text" id="address" required placeholder="Enter your Address" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-brand">
      </div>

      <!-- City & PIN Code Grid -->
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1">
          <label class="block text-xs font-semibold text-gray-700">City <span class="text-red-500">*</span></label>
          <input type="text" id="city" required placeholder="Enter City" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-brand">
        </div>
        <div class="space-y-1">
          <label class="block text-xs font-semibold text-gray-700">PIN Code <span class="text-red-500">*</span></label>
          <input type="text" pattern="[0-9]{6}" id="pinCode" required placeholder="Enter PIN Code" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-brand">
        </div>
      </div>

      <!-- Country Dropdown -->
      <div class="space-y-1">
        <label class="block text-xs font-semibold text-gray-700">Country <span class="text-red-500">*</span></label>
        <select id="country" required class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm bg-white focus:outline-none focus:border-brand">
          <option value="" disabled selected>Select your country</option>
          <option value="India">India</option>
          <option value="Nepal">Nepal</option>
          <option value="Sri Lanka">Sri Lanka</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <!-- Leader Dropdown -->
      <div class="space-y-1">
        <label class="block text-xs font-semibold text-gray-700">Leader Name <span class="text-red-500">*</span></label>
        <select id="leader" required class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm bg-white focus:outline-none focus:border-brand">
          <option value="" disabled selected>Select your leader</option>
          <option value="Leader A">Leader A</option>
          <option value="Leader B">Leader B</option>
          <option value="Leader C">Leader C</option>
        </select>
      </div>

      <!-- Action Button -->
      <div class="pt-4">
        <button type="submit" id="submitBtn" class="w-full py-3 bg-brand hover:bg-brand-dark text-white font-semibold text-sm rounded-lg transition-colors shadow-md flex items-center justify-center gap-2">
          <span>Create Account</span>
        </button>
      </div>

    </form>

    <!-- Support Help Section (Forgot Password Alternative) -->
    <div class="mt-8 text-center border-t border-gray-100 pt-6">
      <p class="text-xs text-gray-400">Need recovery assistance or facing issues?</p>
      <a href="go:contact" class="text-xs text-brand font-medium hover:underline inline-flex items-center gap-1 mt-1.5">
        <span>Contact Support Desk (Available 24/7)</span>
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
      </a>
    </div>
  </main>

  <script>
    // Configuration details
    const IMGBB_API_KEY = "d1a4aa3caf7fdde870ab34b33ad21d87";

    // 1. ImgBB Upload Handler
    async function uploadProfileImage(event) {
      const file = event.target.files[0];
      if (!file) return;

      const preview = document.getElementById('profilePreview');
      const avatar = document.getElementById('defaultAvatar');
      const loader = document.getElementById('uploadLoader');
      const submitBtn = document.getElementById('submitBtn');

      // UI Visual Changes
      loader.classList.remove('hidden');
      submitBtn.disabled = true;

      // Prepare payload
      const formData = new FormData();
      formData.append("image", file);

      try {
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
          method: "POST",
          body: formData
        });

        const data = await response.json();
        if (data.success) {
          const uploadedUrl = data.data.url;
          document.getElementById('imageUrlInput').value = uploadedUrl;
          
          // Show preview
          preview.src = uploadedUrl;
          preview.classList.remove('hidden');
          avatar.classList.add('hidden');
        } else {
          alert("Image upload failed. Please try again.");
        }
      } catch (err) {
        console.error("Upload error:", err);
        alert("Server communication failed during upload.");
      } finally {
        loader.classList.add('hidden');
        submitBtn.disabled = false;
      }
    }

    // 2. DOB 18+ Verification Logic
    function validateAge() {
      const dobInput = document.getElementById('dob');
      const errorMsg = document.getElementById('dobError');
      const submitBtn = document.getElementById('submitBtn');

      if (!dobInput.value) return false;

      const dobDate = new Date(dobInput.value);
      const today = new Date();
      
      let age = today.getFullYear() - dobDate.getFullYear();
      const monthDiff = today.getMonth() - dobDate.getMonth();
      const dayDiff = today.getDate() - dobDate.getDate();

      if (monthDiff < 0 || (monthDiff === 0 && dayDiff < 0)) {
        age--;
      }

      if (age < 18) {
        errorMsg.classList.remove('hidden');
        submitBtn.disabled = true;
        submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
        return false;
      } else {
        errorMsg.classList.add('hidden');
        submitBtn.disabled = false;
        submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        return true;
      }
    }

    // 3. Form Submit Handler
    function handleFormSubmit(event) {
      event.preventDefault();

      // Ensure 18+ check is valid
      if (!validateAge()) return;

      // Extract form variables
      const userData = {
        fullName: document.getElementById('fullName').value,
        mobile: document.getElementById('mobileNumber').value,
        email: document.getElementById('emailAddress').value || "None",
        dob: document.getElementById('dob').value,
        address: document.getElementById('address').value,
        city: document.getElementById('city').value,
        pin: document.getElementById('pinCode').value,
        country: document.getElementById('country').value,
        leader: document.getElementById('leader').value,
        profileImage: document.getElementById('imageUrlInput').value || "Default"
      };

      console.log("Saving user profile to secure session store:", userData);

      // Save registration state locally so page checks bypass this view next time
      localStorage.setItem("is_user_registered", "true");
      localStorage.setItem("user_profile_data", JSON.stringify(userData));

      // Redirect user to AppCreator24 Home
      window.location.href = "go:home";
    }
  </script>
</body>
</html>

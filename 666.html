<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Audio & Video Downloader</title>
    <!-- Tailwind CSS UI के लिए -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col justify-between">

    <!-- Header -->
    <header class="py-6 border-b border-gray-800 text-center">
        <h1 class="text-3xl font-bold tracking-wider text-red-500">YT DOWNLOADER</h1>
        <p class="text-gray-400 mt-2 text-sm">Shorts, Live, and Long Videos का समर्थन</p>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-4 py-8">
        <div class="max-w-xl w-full bg-gray-800 p-6 rounded-2xl shadow-2xl border border-gray-700">
            <h2 class="text-xl font-semibold mb-6 text-center text-gray-200">YouTube वीडियो लिंक दर्ज करें</h2>
            
            <!-- Input Form -->
            <div class="space-y-4">
                <input 
                    type="text" 
                    id="videoUrl" 
                    placeholder="https://www.youtube.com/watch?v=... या Shorts लिंक" 
                    class="w-full px-4 py-3 rounded-lg bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-red-500"
                />
                
                <div class="grid grid-cols-2 gap-4">
                    <button 
                        onclick="processDownload('mp3')" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200"
                    >
                        🎵 Audio (MP3)
                    </button>
                    <button 
                        onclick="processDownload('1080')" 
                        class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200"
                    >
                        🎥 Video (MP4)
                    </button>
                </div>
            </div>

            <!-- Download Frame Container -->
            <div id="downloaderContainer" class="hidden mt-8 p-4 bg-gray-850 border border-gray-700 rounded-xl text-center">
                <p id="loadingText" class="text-yellow-400 text-sm mb-2">डाउनलोड बटन लोड हो रहा है, कृपया नीचे क्लिक करें...</p>
                <div class="w-full flex justify-center">
                    <iframe 
                        id="downloadFrame" 
                        style="width: 100%; height: 60px; border: none; overflow: hidden;" 
                        scrolling="no" 
                        src=""
                    ></iframe>
                </div>
            </div>

            <!-- Status Error Message -->
            <div id="statusMessage" class="hidden mt-4 text-center text-sm font-medium text-red-400"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-4 border-t border-gray-800 text-center text-gray-500 text-xs">
        &copy; 2026 YT Downloader App.
    </footer>

    <script>
        // YouTube Video ID निकालने के लिए फ़ंक्शन (Shorts, Live, Watch और Normal वीडियो का समर्थन करता है)
        function getYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/|live\/)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function processDownload(format) {
            const urlInput = document.getElementById('videoUrl').value.trim();
            const downloaderContainer = document.getElementById('downloaderContainer');
            const downloadFrame = document.getElementById('downloadFrame');
            const statusMessage = document.getElementById('statusMessage');

            // पुरानी सेटिंग्स को रीसेट करें
            statusMessage.classList.add('hidden');
            downloaderContainer.classList.add('hidden');

            if (!urlInput) {
                showError('कृपया एक वैध YouTube वीडियो लिंक दर्ज करें।');
                return;
            }

            const videoId = getYouTubeId(urlInput);
            if (!videoId) {
                showError('अवैध URL! कृपया Shorts, Live या Long वीडियो लिंक फिर से जांचें।');
                return;
            }

            // API एंडपॉइंट सेट करें
            const finalFormat = format === 'mp3' ? 'mp3' : '1080';
            const downloadUrl = `https://loader.to/api/button/?url=https://www.youtube.com/watch?v=${videoId}&f=${finalFormat}`;

            // iframe को सोर्स प्रदान करें और डिस्प्ले करें
            downloadFrame.src = downloadUrl;
            downloaderContainer.classList.remove('hidden');
        }

        function showError(message) {
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.innerText = message;
            statusMessage.classList.remove('hidden');
        }
    </script>
</body>
</html>
